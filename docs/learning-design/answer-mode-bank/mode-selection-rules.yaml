version: 1
principles:
  - Pick the simplest mode that matches the actual student task.
  - Do not force four-option MCQ when the task is direct entry, ordering, or binary judgement.
  - Prefer NUMERIC for arithmetic and measurement outcomes where the final response is a single value.
  - Prefer SHORT_TEXT for words, symbols, explanations, or rewritten statements.
  - Prefer ORDER_SEQUENCE for ranking, sorting, and sequencing prompts.
phase_bias:
  ONBOARDING:
    preferred: [TRUE_FALSE, SINGLE_CHOICE, NUMERIC]
  LEARN:
    preferred: [NUMERIC, SHORT_TEXT, ORDER_SEQUENCE, SINGLE_CHOICE]
  RETEACH:
    preferred: [SHORT_TEXT, NUMERIC, TRUE_FALSE]
  RETAIN:
    preferred: [TRUE_FALSE, SINGLE_CHOICE, NUMERIC]
blocking_rules:
  - if_stem_matches: "(?i)coldest to warmest|smallest to largest|descending order|ascending order|order these"
    block: [SINGLE_CHOICE, TRUE_FALSE]
    prefer: [ORDER_SEQUENCE]
  - if_stem_matches: "(?i)true or false"
    block: [ORDER_SEQUENCE]
    prefer: [TRUE_FALSE]
  - if_stem_matches: "(?i)calculate|find the perimeter|find the median|how much|what is the value"
    block: [SINGLE_CHOICE]
    prefer: [NUMERIC]
  - if_stem_matches: "(?i)write .* in words|place the correct symbol|rewrite"
    prefer: [SHORT_TEXT]
