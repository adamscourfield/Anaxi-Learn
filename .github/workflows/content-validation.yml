name: Content Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-items:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: anaxi
          POSTGRES_PASSWORD: anaxi_secret
          POSTGRES_DB: anaxi_learn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://anaxi:anaxi_secret@localhost:5432/anaxi_learn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Validate learning config
        run: npm run validate:learning
        env:
          NEXT_PUBLIC_DEFAULT_SUBJECT_SLUG: ${{ vars.NEXT_PUBLIC_DEFAULT_SUBJECT_SLUG }}
          NEXT_PUBLIC_ROUTED_SKILL_CODES: ${{ vars.NEXT_PUBLIC_ROUTED_SKILL_CODES }}

      - name: Validate item answer types
        run: npm run validate:items
