name: Content Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-items:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Resolve validation database URL
        shell: bash
        run: |
          DB_URL="${{ secrets.CONTENT_VALIDATION_DATABASE_URL || secrets.DATABASE_URL }}"
          if [ -z "$DB_URL" ]; then
            echo "::error::Missing DB secret. Set CONTENT_VALIDATION_DATABASE_URL (preferred) or DATABASE_URL in repo Actions secrets."
            exit 1
          fi
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Validate learning config
        run: npm run validate:learning
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_DEFAULT_SUBJECT_SLUG: ${{ vars.NEXT_PUBLIC_DEFAULT_SUBJECT_SLUG }}
          NEXT_PUBLIC_ROUTED_SKILL_CODES: ${{ vars.NEXT_PUBLIC_ROUTED_SKILL_CODES }}

      - name: Validate item answer types
        run: npm run validate:items
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
