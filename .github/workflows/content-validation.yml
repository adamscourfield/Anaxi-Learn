name: Content Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-items:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anaxi_learn_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d anaxi_learn_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anaxi_learn_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Sync schema to CI database
        run: npx prisma db push --skip-generate

      - name: Seed database
        run: npm run db:seed

      - name: Validate learning config
        run: npm run validate:learning
        env:
          NEXT_PUBLIC_DEFAULT_SUBJECT_SLUG: ${{ vars.NEXT_PUBLIC_DEFAULT_SUBJECT_SLUG || 'ks3-maths' }}
          NEXT_PUBLIC_ROUTED_SKILL_CODES: ${{ vars.NEXT_PUBLIC_ROUTED_SKILL_CODES || 'N1.1,N1.2,N1.3' }}

      - name: Validate item answer types
        run: npm run validate:items
